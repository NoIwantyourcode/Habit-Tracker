<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>Habit Tracker</h1>
        <div id="topbar">
            <button id="theme">Light</button>
            <input type="text" id="habitInput" placeholder="add a habit...">
            <button id="addBtn">Add!</button>
            <button id="viewToggle">7 day button</button>
            <input type="color" id="habitColor" value="#4ecb71">
        </div>
        <div class="progress">
            <div id="progresslabel">Today's Progress</div>
            <div id="progressContainer">
                <div id="progressBar"></div>
            </div>
        </div>
        <div id="stats"></div>
        <div id="habitList"></div>
        <script src="app.js"></script>
    </body>
</html>
